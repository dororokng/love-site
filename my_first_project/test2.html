<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <div class="cat-container">

        <h1 class="title">Вопрос 2 💖</h1>

        <p id="question">В каком городе мы первый раз встретились?</p>

        <img id ="img" src="second_questions.gif" alt="МЫ" class="cat-gif">
        
        <div class="answers">
            <button onclick="answer('Saratov')" class="btn">Саратов</button>
            <button onclick="answer('Daugavpils')" class="btn">Даугавпилс</button>
            <button onclick="answer('Minsk')" class="btn">Минск</button>
        </div>

        <p id="reaction"></p>

    </div>
</div>

<div class="hearts">
    <div class="heart">💖</div>
    <div class="heart">💕</div>
    <div class="heart">💞</div>
    <div class="heart">💖</div>
    <div class="heart">💘</div>
</div>

<script>
let step = 0;

function answer(result) {
    let img = document.getElementById("img")
    let reaction = document.getElementById("reaction");

    if (result === 'Saratov') {
        reaction.innerText = "Балбесик, там мы позже встретились😅";
        reaction.style.color = "red";
        return;
    }else if (result === 'Daugavpils'){
        reaction.innerText = "Неправильно, там нам еще предстоит побывать вместе!🙃";
        reaction.style.color = "red";
        return;
    }else{
        reaction.innerText = "Вот это правильно, умничка!❤️";
        reaction.style.color = "#ff4d6d";
        img.src = "second_questions_happy.gif"

        setTimeout(() => {
            window.location.href = "test3.html";
        }, 2500);
    }


}
</script>

</body>
</html>
