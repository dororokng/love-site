<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <div class="cat-container">

        <h1 class="title">Вопрос 1 💖</h1>

        <p id="question">Ты меня любишь?</p>

        <img id ="sad_1" src="first_questions_sad.gif" alt="МЫ" class="cat-gif">
        
        <div class="answers">
            <button onclick="answer(true)" class="btn">Да ☺️</button>
            <button onclick="answer(false)" class="btn">Нет 💩</button>
        </div>

        <p id="reaction"></p>

    </div>
</div>

<div class="hearts">
    <div class="heart">💖</div>
    <div class="heart">💕</div>
    <div class="heart">💞</div>
    <div class="heart">💖</div>
    <div class="heart">💘</div>
</div>

<script>
let step = 0;

function answer(isYes) {
    let img = document.getElementById("sad_1")
    let reaction = document.getElementById("reaction");

    if (!isYes) {
        reaction.innerText = "Неправильный ответ😡 Подумай еще раз!";
        reaction.style.color = "red";
        return;
    }

    reaction.innerText = "Я знал 💖";
    reaction.style.color = "#ff4d6d";
    img.src = "first_questions_happy.gif"

    setTimeout(() => {
        window.location.href = "test2.html";
    }, 2500);
}
</script>

</body>
</html>
